[package]
name = "msnchat-rs"
version = "2.0.0"
edition = "2024"

[dependencies]
env_logger = "0.11"
log = "0.4"
minhook = "0.9"
pelite = "0.10"
rand = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.22", features = ["v4"] }
windows = { version = "0.62", features = ["Win32_System_Diagnostics_Debug", "Win32_Foundation", "Win32_UI_WindowsAndMessaging", "Win32_System_Com", "Win32_System_LibraryLoader", "Win32_Graphics_Gdi", "Win32_System_Ole", "Win32_System_Variant", "Win32_UI_Controls", "Win32_UI_Controls_RichEdit", "Win32_System_Memory", "Win32_System_Threading", "Win32_UI_Input_KeyboardAndMouse", "Win32_Networking_WinSock", "Win32_UI_Shell"] }
windows-core = "0.62"

[build-dependencies]
pelite = "0.10"
winres = "0.1"
